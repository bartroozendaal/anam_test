<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Redirecting...</title>
  <script type="text/javascript">
    // Redirect all 404s to index.html for Angular routing, honoring <base> href
    try {
      var baseEl = document.querySelector('base');
      var baseHref = baseEl ? (baseEl.getAttribute('href') || '/') : '/';
      if (!baseHref.endsWith('/')) baseHref += '/';
      var redirectTo = baseHref + 'index.html';
      var path = window.location.pathname + window.location.search + window.location.hash;
      if (path !== '/' && !path.startsWith(baseHref + 'index.html')) {
        redirectTo += '?redirect=' + encodeURIComponent(path);
      }
      window.location.replace(redirectTo);
    } catch (e) {
      // fallback to root index
      window.location.replace('/index.html');
    }
  </script>
</head>

<body>
  <h1>Redirecting...</h1>
  <p>If you are not redirected, <a id="redirect-link"
      href="index.html">click here</a>.</p>
  <script>document.getElementById('redirect-link').href = redirectTo;</script>
</body>

</html>
